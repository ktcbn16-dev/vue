<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>現在時刻</title>
</head>
<body>
  <h1>現在時刻</h1>
  <p id="time"></p>

  <script>
    function showTime() {
      const now = new Date();
      document.getElementById("time").textContent = now.toLocaleString();
    }

    showTime();
    setInterval(showTime, 1000);
  </script>
</body>
</html>
