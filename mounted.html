<!DOCTYPE html>
<html lang='ja'>
  <head>
    <meta charset="utf-8">
    <title>Vue.js のサンプル</title>
    <script src="https://unpkg.com/vue@3.0.0/dist/vue.global.js"></script>
  </head>

  <body>
    <h1>Vue3</h1>
    <div id="app">
      <p>{{ message }}</p>
    </div>

    <script>
      const appdata = {

// this はこのVueアプリ自身を指す。dataのmessageやcoutを操作できる
// data() は画面で使う値を用意する場所

        data() {
          return {
            message: "Hello Vue!",
            count: 0
          }
        },

// mounted() は画面表示された後に自動で実行される

        mounted() {
          setInterval(() => {
            this.count++
            this.message = 'Count: ' + this.count
          }, 1000)
        }
      }

      Vue.createApp(appdata).mount('#app')
    </script>
  </body>
</html>
